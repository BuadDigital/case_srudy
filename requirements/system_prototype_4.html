<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة إدارة التقييم العقاري</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#0F3460;--primary-mid:#1A5276;--primary-light:#2E86C1;
  --accent:#1ABC9C;--accent-dark:#148F77;
  --sidebar:#0A2138;--surface:#FFFFFF;--surface2:#F4F7FB;--surface3:#EAF0F8;
  --border:#D5E3F0;--border2:#BDD0E8;--text:#1A2B3C;--text2:#4A6272;--text3:#8FA8BC;
  --success:#1ABC9C;--success-bg:#D5F5EF;--warning:#F39C12;--warning-bg:#FEF3D7;
  --danger:#E74C3C;--danger-bg:#FADBD8;--info:#2980B9;--info-bg:#D6EAF8;
  --purple:#8E44AD;--purple-bg:#EBD9F7;--orange:#D35400;--orange-bg:#FAE5D3;
  --radius:8px;--radius-lg:14px;--shadow:0 1px 4px rgba(15,52,96,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--surface2);color:var(--text);font-size:13px;overflow:hidden;}
#app{display:flex;height:100vh;}
#sidebar{width:234px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 22px;flex-shrink:0;box-shadow:var(--shadow);}
#content{flex:1;overflow-y:auto;padding:22px;}
.sb-brand{padding:16px;border-bottom:1px solid rgba(255,255,255,.06);}
.sb-brand-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.sb-icon{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-brand h1{font-size:11.5px;font-weight:600;color:#fff;line-height:1.4;}
.sb-brand p{font-size:10px;color:rgba(255,255,255,.3);}
.sb-role{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.06);}
.sb-role-lbl{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.sb-role select{width:100%;font-size:11px;padding:6px 8px;border-radius:var(--radius);background:rgba(255,255,255,.07);color:#fff;border:1px solid rgba(255,255,255,.12);cursor:pointer;font-family:inherit;}
.sb-role select option{background:#0F3460;}
.sb-grp{padding:8px 0 2px;}
.sb-grp-lbl{font-size:9px;font-weight:600;color:rgba(255,255,255,.22);text-transform:uppercase;letter-spacing:.08em;padding:4px 16px 2px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 16px;cursor:pointer;color:rgba(255,255,255,.48);font-size:12px;border-right:3px solid transparent;transition:all .15s;}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);}
.nav-item.active{background:rgba(26,188,156,.12);color:var(--accent);border-right-color:var(--accent);font-weight:500;}
.nav-item.locked{opacity:.2;cursor:not-allowed;pointer-events:none;}
.nav-item svg{width:14px;height:14px;flex-shrink:0;}
.nav-badge{margin-right:auto;background:var(--danger);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;font-weight:600;}
.tb-left{display:flex;align-items:center;gap:12px;}
.tb-breadcrumb{font-size:11px;color:var(--text3);}
.tb-title{font-size:14px;font-weight:600;color:var(--text);}
.tb-right{display:flex;align-items:center;gap:10px;}
.user-chip{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 6px;}
.avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.role-pill{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;border-top:3px solid var(--accent);}
.stat-card.blue{border-top-color:var(--primary-light);}
.stat-card.green{border-top-color:var(--success);}
.stat-card.warn{border-top-color:var(--warning);}
.stat-card.red{border-top-color:var(--danger);}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:7px;}
.stat-value{font-size:26px;font-weight:700;color:var(--text);line-height:1;}
.stat-sub{font-size:10px;color:var(--text3);margin-top:4px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow);}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);}
.card-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px;}
.card-body{padding:16px;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:11px;font-weight:500;color:var(--text2);padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);text-align:right;white-space:nowrap;}
.tbl td{font-size:12px;padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tbody tr:hover td{background:var(--surface2);cursor:pointer;}
.id-cell{color:var(--primary-light)!important;font-weight:600;font-size:11px;}
.badge{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap;}
.b-new{background:var(--info-bg);color:var(--info);}
.b-prog{background:var(--warning-bg);color:var(--warning);}
.b-done{background:var(--success-bg);color:var(--success);}
.b-fail{background:var(--danger-bg);color:var(--danger);}
.b-cancel{background:#EEF0F3;color:#6B7A8D;}
.b-key{background:var(--orange-bg);color:var(--orange);}
.b-survey{background:var(--purple-bg);color:var(--purple);}
.b-int{background:var(--info-bg);color:var(--info);}
.b-free{background:var(--warning-bg);color:var(--warning);}
.b-ext{background:#EEF0F3;color:#6B7A8D;}
.btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;font-family:inherit;background:var(--surface);color:var(--text);transition:all .15s;font-weight:500;}
.btn:hover{background:var(--surface2);}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.btn-primary:hover{background:var(--primary-mid);}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-success{background:var(--success);color:#fff;border-color:var(--success);}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger);}
.btn-sm{font-size:11px;padding:4px 9px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block;}
.form-control{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);transition:border-color .15s;}
.form-control:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(41,128,185,.1);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.prog-wrap{background:var(--surface3);border-radius:4px;height:5px;overflow:hidden;}
.prog-bar{height:100%;border-radius:4px;background:var(--primary-light);transition:width .4s;}
.prog-bar.g{background:var(--success);}
.prog-bar.o{background:var(--warning);}
.prog-bar.r{background:var(--danger);}
.track-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.track-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;}
.track-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;}
.track-name{font-size:12px;font-weight:500;color:var(--text);}
.track-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.tl-item{display:flex;gap:11px;padding:6px 0;}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--primary-light);margin-top:4px;flex-shrink:0;}
.tl-dot.g{background:var(--success);}
.tl-dot.o{background:var(--warning);}
.tl-body{flex:1;border-bottom:1px solid var(--border);padding-bottom:6px;}
.tl-item:last-child .tl-body{border-bottom:none;}
.tl-action{font-size:12px;font-weight:500;color:var(--text);}
.tl-meta{font-size:10px;color:var(--text3);margin-top:1px;}
.msg-item{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.msg-item:hover{background:var(--surface2);}
.msg-item.unread{background:#EBF5FF;}
.msg-udot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0;}
.msg-content{flex:1;min-width:0;}
.msg-from{font-size:12px;font-weight:600;color:var(--text);}
.msg-dept{font-size:10px;color:var(--text3);}
.msg-preview{font-size:11px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.msg-time{font-size:10px;color:var(--text3);white-space:nowrap;}
.sec-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.note{padding:10px 14px;border-radius:var(--radius);font-size:12px;margin-bottom:12px;border-right:3px solid;line-height:1.6;}
.note-info{background:var(--info-bg);border-color:var(--info);color:#1a5276;}
.note-warn{background:var(--warning-bg);border-color:var(--warning);color:#784212;}
.note-success{background:var(--success-bg);border-color:var(--success);color:#0e6655;}
.note-danger{background:var(--danger-bg);border-color:var(--danger);color:#922b21;}
.kpi-lbl{font-size:11px;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between;}
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;display:flex;align-items:center;gap:10px;}
.team-info{flex:1;min-width:0;}
.team-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.team-role{font-size:10px;color:var(--text3);margin-top:1px;}
.team-count{font-size:22px;font-weight:700;color:var(--primary-light);min-width:30px;text-align:left;}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;}
.tab{padding:8px 14px;cursor:pointer;font-size:12px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500;}
.doc-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.doc-row:last-child{border-bottom:none;}
.doc-info{display:flex;align-items:center;gap:9px;}
.doc-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.fail-card{background:var(--surface);border:1px solid var(--border);border-right:3px solid var(--danger);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;}
.field-form{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;}
.field-sec-title{font-size:11px;font-weight:600;color:var(--primary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.radio-group{display:flex;gap:12px;flex-wrap:wrap;margin-top:5px;}
.radio-opt{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;}
.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;}
.photo-ph{aspect-ratio:1;background:var(--surface3);border:2px dashed var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:10px;gap:4px;transition:all .15s;}
.photo-ph:hover{border-color:var(--primary-light);color:var(--primary-light);}
</style>
</head>

    </div>
  </div>
  <div id="content"></div>
</div>
</div>

  const COMP_Q=['هل يوجد في العقار بئر.','هل يوجد في العقار غرفة كهرباء.','هل يوجد في العقار أبراج كهرباء.','هل يوجد في العقار أبراج اتصالات.','هل يوجد في العقار مضخة دفاع مدني.','هل يوجد في العقار منقولات.','هل يوجد في العقار مركبات.','هل يوجد في العقار معدات زراعية او موجودات حيوية.','هل تم مطابقة مكونات العقار على الطبيعة مع المكونات المذكورة في الصك. (للأصول المجمدة)'];
  const OCC_Q=['هل العقار مأهول بالسكن.','هل يوجد عقد إيجار.','هل تم مطابقة رقم الصك بالمذكوربعقد الإيجار.','هل عقد الإيجار ساري.','هل عقد الإيجار إلكتروني.','هل يوجد اتحاد ملاك؟'];

      <td style="text-align:center;width:110px"><div style="display:flex;justify-content:center"><div id="cb_${key}_B" onclick="csTog('${key}','B')" style="width:20px;height:20px;border:2px solid var(--border2);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--surface)"></div></div></td>
    </tr>`;
  }
  function csTog(key,val){
    FA[key]=FA[key]===val?null:val;

      else{el.style.background='var(--surface)';el.style.borderColor='var(--border2)';el.innerHTML='';}

    const total=DEED_Q.length+SURVEY_Q.length+COMP_Q.length+OCC_Q.length+EXTRA_Q.length;
    const done=Object.values(FA).filter(v=>v).length;
    const pct=Math.round(done/total*100);

      ${[['أحمد سعيد — معاين',88],['عبدالله عبدالمانع — معاين',94],['حسن عطية — معاين (متعاون)',79],['عبدالله الكثيري — مقيم',85],['محمد العساف — مقيم',82]].map(([n,v])=>`<div style="margin-bottom:12px"><div class="kpi-lbl"><span>${n}</span><span style="font-weight:600">${v}%</span></div><div class="prog-wrap"><div class="prog-bar ${v>=85?'g':v>=70?'':'r'}" style="width:${v}%"></div></div></div>`).join('')}
    </div></div>
  </div>`;
}

function pgUsers(){
  return`<div class="card"><div class="card-header"><span class="card-title">جميع المستخدمين (${STAFF.length})</span>${!isViewOnly()?'<button class="btn btn-sm btn-primary">+ إضافة مستخدم</button>':'<span class="badge b-cancel">اطلاع فقط</span>'}</div>
  <table class="tbl"><thead><tr><th>الاسم</th><th>الدور</th><th>البريد الإلكتروني</th><th>نوع التعاقد</th><th>الحالة</th></tr></thead><tbody>
  ${STAFF.map(u=>`<tr><td style="font-weight:500">${u.name}</td><td style="font-size:11px;color:var(--text2)">${u.role}</td><td style="direction:ltr;text-align:right;font-size:11px;color:var(--primary-light)">${u.email}</td><td><span class="badge ${u.type==='internal'?'b-int':u.type==='freelance'?'b-free':'b-ext'}">${u.type==='internal'?'موظف داخلي':u.type==='freelance'?'متعاون':'خارجي'}</span></td><td><span class="badge b-done">نشط</span></td></tr>`).join('')}
  </tbody></table></div>`;
}

switchRole('general-manager');
nav('dashboard');
</script>
