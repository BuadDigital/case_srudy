[SERVICE]
    Flush         1
    Log_Level     info
    Daemon        off
    Parsers_File  parsers.conf

# Demo input: heartbeat logs until app containers are wired.
[INPUT]
    Name              dummy
    Tag               infra.heartbeat
    Dummy             {"message":"fluent-bit connected","service":"infra"}
    Rate              1

[OUTPUT]
    Name            es
    Match           *
    Host            elasticsearch
    Port            9200
    Logstash_Format On
    Logstash_Prefix fluentbit
    Suppress_Type_Name On
    Replace_Dots    On
