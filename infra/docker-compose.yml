# Local platform stack for Real Estate Evaluation (dev only).
# Usage: from repo root →  docker compose -f infra/docker-compose.yml up -d
# See docs/LOCAL_INFRA.md for URLs and credentials.

name: realestate-eval-infra

services:
  postgres:
    image: postgres:17-alpine
    container_name: ree-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admin
      POSTGRES_DB: realestate_eval_dev
    ports:
      - "5432:5432"
    volumes:
      - ree_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d realestate_eval_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ree-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: dev
      RABBITMQ_DEFAULT_PASS: dev
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ree-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: ree-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ree-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ree_prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ree-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ree_grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - jaeger

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: ree-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - ree_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: ree-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  fluent-bit:
    image: fluent/fluent-bit:3.1
    container_name: ree-fluent-bit
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    # Optional: mount Docker container logs when running API in Docker later
    # volumes:
    #   - /var/lib/docker/containers:/var/lib/docker/containers:ro

  identity:
    build:
      context: ..
      dockerfile: backend/services/identity/RealEstateEval.Identity.Api/Dockerfile
    container_name: ree-identity
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      Redis__ConnectionString: redis:6379
      REAL_ESTATE_EVAL_PG_CONNECTION_STRING: Host=postgres;Port=5432;Database=realestate_eval_dev;Username=postgres;Password=Admin
      Jwt__Issuer: RealEstateEval
      Jwt__Audience: RealEstateEval
      Jwt__SigningKey: CHANGE_ME_DEV_ONLY_USE_64_CHARS_MINIMUM_FOR_HMAC_SHA256_SIGNING_KEY_0123456789ABCDEF
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  case-study:
    build:
      context: ..
      dockerfile: backend/services/case-study/RealEstateEval.CaseStudy.Api/Dockerfile
    container_name: ree-case-study
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      Redis__ConnectionString: redis:6379
      REAL_ESTATE_EVAL_PG_CONNECTION_STRING: Host=postgres;Port=5432;Database=realestate_eval_dev;Username=postgres;Password=Admin
      Jwt__Issuer: RealEstateEval
      Jwt__Audience: RealEstateEval
      Jwt__SigningKey: CHANGE_ME_DEV_ONLY_USE_64_CHARS_MINIMUM_FOR_HMAC_SHA256_SIGNING_KEY_0123456789ABCDEF
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: dev
      RabbitMQ__Password: dev
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "8080"

  operations:
    build:
      context: ..
      dockerfile: backend/services/operations/RealEstateEval.Operations.Api/Dockerfile
    container_name: ree-operations
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      Redis__ConnectionString: redis:6379
      REAL_ESTATE_EVAL_PG_CONNECTION_STRING: Host=postgres;Port=5432;Database=realestate_eval_dev;Username=postgres;Password=Admin
      Jwt__Issuer: RealEstateEval
      Jwt__Audience: RealEstateEval
      Jwt__SigningKey: CHANGE_ME_DEV_ONLY_USE_64_CHARS_MINIMUM_FOR_HMAC_SHA256_SIGNING_KEY_0123456789ABCDEF
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  reporting:
    build:
      context: ..
      dockerfile: backend/services/reporting/RealEstateEval.Reporting.Api/Dockerfile
    container_name: ree-reporting
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      Redis__ConnectionString: redis:6379
      UpstreamServices__GatewayBaseUrl: http://gateway:5160
      UpstreamServices__CaseStudyBaseUrl: http://case-study:8080
      UpstreamServices__ValuationBaseUrl: http://valuation:8080
      UpstreamServices__FailuresBaseUrl: http://failures:8080
      REAL_ESTATE_EVAL_PG_CONNECTION_STRING: Host=postgres;Port=5432;Database=realestate_eval_dev;Username=postgres;Password=Admin
      Jwt__Issuer: RealEstateEval
      Jwt__Audience: RealEstateEval
      Jwt__SigningKey: CHANGE_ME_DEV_ONLY_USE_64_CHARS_MINIMUM_FOR_HMAC_SHA256_SIGNING_KEY_0123456789ABCDEF
    depends_on:
      case-study:
        condition: service_started
      valuation:
        condition: service_started
      failures:
        condition: service_started
    expose:
      - "8080"

  financial:
    build:
      context: ..
      dockerfile: backend/services/financial/RealEstateEval.Financial.Api/Dockerfile
    container_name: ree-financial
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      Redis__ConnectionString: redis:6379
      REAL_ESTATE_EVAL_PG_CONNECTION_STRING: Host=postgres;Port=5432;Database=realestate_eval_dev;Username=postgres;Password=Admin
      Jwt__Issuer: RealEstateEval
      Jwt__Audience: RealEstateEval
      Jwt__SigningKey: CHANGE_ME_DEV_ONLY_USE_64_CHARS_MINIMUM_FOR_HMAC_SHA256_SIGNING_KEY_0123456789ABCDEF
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  valuation:
    build:
      context: ..
      dockerfile: backend/services/valuation/RealEstateEval.Valuation.Api/Dockerfile
    container_name: ree-valuation
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      Redis__ConnectionString: redis:6379
      REAL_ESTATE_EVAL_PG_CONNECTION_STRING: Host=postgres;Port=5432;Database=realestate_eval_dev;Username=postgres;Password=Admin
      Jwt__Issuer: RealEstateEval
      Jwt__Audience: RealEstateEval
      Jwt__SigningKey: CHANGE_ME_DEV_ONLY_USE_64_CHARS_MINIMUM_FOR_HMAC_SHA256_SIGNING_KEY_0123456789ABCDEF
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  failures:
    build:
      context: ..
      dockerfile: backend/services/failures/RealEstateEval.Failures.Api/Dockerfile
    container_name: ree-failures
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      Redis__ConnectionString: redis:6379
      REAL_ESTATE_EVAL_PG_CONNECTION_STRING: Host=postgres;Port=5432;Database=realestate_eval_dev;Username=postgres;Password=Admin
      Jwt__Issuer: RealEstateEval
      Jwt__Audience: RealEstateEval
      Jwt__SigningKey: CHANGE_ME_DEV_ONLY_USE_64_CHARS_MINIMUM_FOR_HMAC_SHA256_SIGNING_KEY_0123456789ABCDEF
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  platform:
    build:
      context: ..
      dockerfile: backend/services/platform/RealEstateEval.Platform.Api/Dockerfile
    container_name: ree-platform
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      Redis__ConnectionString: redis:6379
      REAL_ESTATE_EVAL_PG_CONNECTION_STRING: Host=postgres;Port=5432;Database=realestate_eval_dev;Username=postgres;Password=Admin
      Jwt__Issuer: RealEstateEval
      Jwt__Audience: RealEstateEval
      Jwt__SigningKey: CHANGE_ME_DEV_ONLY_USE_64_CHARS_MINIMUM_FOR_HMAC_SHA256_SIGNING_KEY_0123456789ABCDEF
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  attachments:
    build:
      context: ..
      dockerfile: backend/services/attachments/RealEstateEval.Attachments.Api/Dockerfile
    container_name: ree-attachments
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      Redis__ConnectionString: redis:6379
      REAL_ESTATE_EVAL_PG_CONNECTION_STRING: Host=postgres;Port=5432;Database=realestate_eval_dev;Username=postgres;Password=Admin
      Jwt__Issuer: RealEstateEval
      Jwt__Audience: RealEstateEval
      Jwt__SigningKey: CHANGE_ME_DEV_ONLY_USE_64_CHARS_MINIMUM_FOR_HMAC_SHA256_SIGNING_KEY_0123456789ABCDEF
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"

  gateway:
    build:
      context: ..
      dockerfile: backend/gateway/RealEstateEval.Gateway/Dockerfile
    container_name: ree-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "5160:5160"
    depends_on:
      - identity
      - case-study
      - operations
      - reporting
      - financial
      - valuation
      - failures
      - platform
      - attachments

volumes:
  ree_pgdata:
  ree_prometheus_data:
  ree_grafana_data:
  ree_es_data: